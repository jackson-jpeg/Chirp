name: ChirpChirp
options:
  bundleIdPrefix: com.chirpchirp
  deploymentTarget:
    iOS: "26.0"
  xcodeVersion: "26.0"

packages:
  Opus:
    url: https://github.com/alta/swift-opus
    from: "0.0.1"
  GRDB:
    url: https://github.com/groue/GRDB.swift
    from: "7.0.0"
  MapLibreNative:
    url: https://github.com/maplibre/maplibre-gl-native-distribution
    from: "6.9.0"

settings:
  base:
    SWIFT_VERSION: "6.0"
    SWIFT_STRICT_CONCURRENCY: complete
    INFOPLIST_FILE: Chirp/Info.plist
    CODE_SIGN_ENTITLEMENTS: Chirp/Chirp.entitlements
    TARGETED_DEVICE_FAMILY: "1"
    SUPPORTED_PLATFORMS: iphoneos iphonesimulator
    DEVELOPMENT_TEAM: 2MU4PC84GZ

targets:
  Chirp:
    type: application
    platform: iOS
    sources:
      - path: Chirp/Sources
      - path: Chirp/Resources
    dependencies:
      - package: Opus
        product: Opus
      - package: GRDB
        product: GRDB
      - package: MapLibreNative
        product: MapLibre
      - sdk: CoreBluetooth.framework
      - sdk: SoundAnalysis.framework
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacksonmsanger.chirpchirp
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
    info:
      path: Chirp/Info.plist
      properties:
        CFBundleDisplayName: ChirpChirp
        UILaunchScreen: {}
        UISupportedInterfaceOrientations:
          - UIInterfaceOrientationPortrait
          - UIInterfaceOrientationLandscapeLeft
          - UIInterfaceOrientationLandscapeRight
          - UIInterfaceOrientationPortraitUpsideDown
        NSMicrophoneUsageDescription: "ChirpChirp needs microphone access to transmit your voice to nearby devices."
        NSCameraUsageDescription: "ChirpChirp uses your camera to take photos and share them with nearby devices."
        NSPhotoLibraryUsageDescription: "ChirpChirp accesses your photo library to share images with nearby devices."
        NSPhotoLibraryAddUsageDescription: "ChirpChirp saves received images to your photo library."
        NSBluetoothAlwaysUsageDescription: "ChirpChirp scans for nearby Bluetooth devices to help detect potential surveillance or tracking equipment."
        NSLocalNetworkUsageDescription: "ChirpChirp uses your local network to discover and connect to nearby devices for walkie-talkie communication."
        NSBonjourServices:
          - "_chirp-ptt._udp."
          - "_chirp-ptt._tcp."
        NSSupportsLiveActivities: true
        UIBackgroundModes:
          - audio
          - fetch
        BGTaskSchedulerPermittedIdentifiers:
          - com.chirpchirp.mesh.refresh

  ChirpLiveActivity:
    type: app-extension
    platform: iOS
    sources:
      - path: ChirpLiveActivity
      - path: Chirp/Sources/Models/ChirpActivityAttributes.swift
    dependencies: []
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacksonmsanger.chirpchirp.live-activity
        INFOPLIST_FILE: ChirpLiveActivity/Info.plist
        MARKETING_VERSION: "1.0.0"
        CURRENT_PROJECT_VERSION: "1"
        GENERATE_INFOPLIST_FILE: false
        LD_RUNPATH_SEARCH_PATHS: "$(inherited) @executable_path/Frameworks @executable_path/../../Frameworks"
        SWIFT_VERSION: "6.0"
        TARGETED_DEVICE_FAMILY: "1"
        SUPPORTED_PLATFORMS: iphoneos iphonesimulator

  ChirpTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: ChirpTests
    dependencies:
      - target: Chirp
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.jacksonmsanger.chirpchirp.tests
