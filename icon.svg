<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#0f172a"/>
      <stop offset="100%" stop-color="#1e293b"/>
    </linearGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>

  <!-- Wire -->
  <line x1="160" y1="640" x2="864" y2="620" stroke="#FFB800" stroke-width="8" stroke-linecap="round" opacity="0.5"/>

  <!-- Left bird - round, cute, chirping right -->
  <g transform="translate(380, 540)">
    <!-- Body -->
    <ellipse cx="0" cy="36" rx="96" ry="88" fill="#FFB800"/>
    <!-- Head -->
    <circle cx="0" cy="-28" r="60" fill="#FFB800"/>
    <!-- Eye -->
    <circle cx="20" cy="-36" r="16" fill="#0f172a"/>
    <circle cx="26" cy="-40" r="6" fill="white"/>
    <!-- Beak - open, chirping -->
    <path d="M52,-20 L92,-12 L56,-4Z" fill="#FF6B35"/>
    <!-- Wing -->
    <ellipse cx="-32" cy="32" rx="52" ry="36" fill="#E6A600" transform="rotate(-15, -32, 32)"/>
    <!-- Feet on wire -->
    <line x1="-20" y1="116" x2="-20" y2="96" stroke="#FF6B35" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="112" x2="20" y2="92" stroke="#FF6B35" stroke-width="8" stroke-linecap="round"/>
    <!-- Sound lines (chirping!) -->
    <line x1="84" y1="-40" x2="112" y2="-52" stroke="#FFD466" stroke-width="10" stroke-linecap="round" opacity="0.8"/>
    <line x1="88" y1="-16" x2="120" y2="-16" stroke="#FFD466" stroke-width="10" stroke-linecap="round" opacity="0.5"/>
    <line x1="84" y1="8" x2="110" y2="14" stroke="#FFD466" stroke-width="10" stroke-linecap="round" opacity="0.3"/>
  </g>

  <!-- Right bird - slightly tilted toward left bird, listening -->
  <g transform="translate(652, 528) rotate(-8)">
    <!-- Body -->
    <ellipse cx="0" cy="36" rx="96" ry="88" fill="#FFB800"/>
    <!-- Head -->
    <circle cx="0" cy="-28" r="60" fill="#FFB800"/>
    <!-- Eye - looking at the other bird -->
    <circle cx="-20" cy="-36" r="16" fill="#0f172a"/>
    <circle cx="-26" cy="-40" r="6" fill="white"/>
    <!-- Beak - facing left (toward the other bird) -->
    <path d="M-52,-20 L-92,-12 L-56,-4Z" fill="#FF6B35"/>
    <!-- Wing -->
    <ellipse cx="32" cy="32" rx="52" ry="36" fill="#E6A600" transform="rotate(15, 32, 32)"/>
    <!-- Feet on wire -->
    <line x1="-20" y1="116" x2="-20" y2="96" stroke="#FF6B35" stroke-width="8" stroke-linecap="round"/>
    <line x1="20" y1="112" x2="20" y2="92" stroke="#FF6B35" stroke-width="8" stroke-linecap="round"/>
  </g>
</svg>
