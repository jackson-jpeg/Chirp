<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1024 1024" width="1024" height="1024">
  <defs>
    <radialGradient id="bg" cx="50%" cy="40%" r="75%">
      <stop offset="0%" stop-color="#1E1E22"/>
      <stop offset="100%" stop-color="#0A0A0C"/>
    </radialGradient>
    <linearGradient id="amber1" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFD54F"/>
      <stop offset="100%" stop-color="#FFB800"/>
    </linearGradient>
    <linearGradient id="amber2" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#FFB800"/>
      <stop offset="100%" stop-color="#E09E00"/>
    </linearGradient>
    <radialGradient id="glow" cx="42%" cy="45%" r="30%">
      <stop offset="0%" stop-color="#FFB800" stop-opacity="0.12"/>
      <stop offset="100%" stop-color="#FFB800" stop-opacity="0"/>
    </radialGradient>
  </defs>

  <!-- Background -->
  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#glow)"/>

  <!-- Sharp angular bird — facing right, beak open, chirping -->
  <g transform="translate(180, 280)">
    <!-- Tail — angular spikes -->
    <polygon points="0,200 -30,120 60,170" fill="url(#amber2)"/>
    <polygon points="0,230 -40,280 50,240" fill="url(#amber2)"/>
    <polygon points="10,160 -20,60 80,130" fill="url(#amber2)" opacity="0.85"/>

    <!-- Body — sleek angular shape -->
    <path d="
      M 60,130
      L 120,50
      L 200,20
      L 300,30
      L 360,80
      L 380,150
      L 360,230
      L 300,280
      L 200,300
      L 100,280
      L 40,230
      Z
    " fill="url(#amber1)"/>

    <!-- Wing accent -->
    <path d="
      M 80,190
      L 160,140
      L 280,150
      L 320,180
      L 260,220
      L 140,230
      Z
    " fill="url(#amber2)" opacity="0.45"/>

    <!-- Upper beak — sharp, angular -->
    <polygon points="380,110 480,100 380,140" fill="url(#amber1)"/>

    <!-- Lower beak — separated for open chirp -->
    <polygon points="380,170 470,170 380,200" fill="url(#amber2)"/>

    <!-- Eye — sharp diamond shape -->
    <polygon points="260,100 280,80 300,100 280,120" fill="#0A0A0C"/>
    <polygon points="275,95 282,88 290,95 282,102" fill="#FFD54F" opacity="0.7"/>
  </g>

  <!-- Sound waves — three sharp arcs -->
  <g fill="none" stroke-linecap="round">
    <path d="M 680,340 C 710,400 710,460 680,510"
          stroke="#FFB800" stroke-width="20" opacity="0.85"/>
    <path d="M 730,300 C 775,385 775,480 730,555"
          stroke="#FFB800" stroke-width="15" opacity="0.5"/>
    <path d="M 775,265 C 835,370 835,500 775,595"
          stroke="#FFB800" stroke-width="10" opacity="0.25"/>
  </g>
</svg>
